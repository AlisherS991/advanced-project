<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City - Report an Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Mesto dlya zhalob (Smart City)</span>
            <div class="text-white">
                Ty zashel kak: <strong>{{ username }}</strong> |
                <a href="/vylazi_otsyuda" class="btn btn-sm btn-outline-light ms-2">Vyiti nahren</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Rasskazhi chto slomalos v gorode</h3>

                        <form action="/zakidyvaem_bedu" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label for="description" class="form-label">Opishi bedu svoimi slovami:</label>
                                <textarea class="form-control" id="description" name="description" rows="3"
                                    placeholder="Primer: Yama na doroge, net sveta, musor vezde..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="photo" class="form-label">Zagruzi fotku (dokazuha obyazatelna):</label>
                                <input class="form-control" type="file" id="photo" name="photo" accept="image/*"
                                    required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Zakinut zhalobu v kosmos</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
